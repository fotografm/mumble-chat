name: Build Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y makeself

      - name: Install Python 3.12
        run: |
          sudo add-apt-repository -y ppa:deadsnakes/ppa
          sudo apt-get update -q
          sudo apt-get install -y python3.12 python3.12-venv python3.12-dev python3.12-tk

      - name: Install PyInstaller and pymumble
        run: |
          python3.12 -m venv buildenv
          buildenv/bin/pip install --upgrade pip
          buildenv/bin/pip install \
            pyinstaller \
            "git+https://codeberg.org/pymumble/pymumble.git"

      - name: Build binary with PyInstaller
        run: |
          buildenv/bin/pyinstaller \
            --onefile \
            --collect-all tkinter \
            --name mumble-chat \
            mumble_chat.py

      - name: Assemble package directory
        run: |
          mkdir -p MumbleChatPkg

          cp dist/mumble-chat MumbleChatPkg/

          # ── Launcher script — runs inside the extracted package ────────────
          # Mirrors setup_mumble_chat.sh: installs Yggdrasil if absent,
          # manages its lifecycle around each session.
          cat > MumbleChatPkg/run.sh << 'RUNSCRIPT'
          #!/bin/bash
          HERE="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          TAG="${1:-}"   # version tag passed by makeself

          echo ""
          echo "┌──────────────────────────────────────────┐"
          echo "│         Mumble Chat — Starting           │"
          echo "└──────────────────────────────────────────┘"
          echo ""

          # ── Yggdrasil ───────────────────────────────────────────────────────
          ensure_yggdrasil() {
              if command -v yggdrasil &>/dev/null; then
                  YGG_ADDR=$(yggdrasilctl getself 2>/dev/null \
                      | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('address',''))" \
                      2>/dev/null || true)
                  echo "  ✓ Yggdrasil already installed."
                  [ -n "$YGG_ADDR" ] && echo "    Your address: $YGG_ADDR"
                  echo ""
                  return 0
              fi

              echo "  ──────────────────────────────────────────"
              echo "   Yggdrasil is not installed"
              echo "  ──────────────────────────────────────────"
              echo ""
              echo "  Mumble Chat connects to Mumble servers over Yggdrasil —"
              echo "  a free, encrypted, peer-to-peer IPv6 network."
              echo "  Without it you can only reach standard Mumble servers"
              echo "  by hostname or public IP."
              echo ""
              read -r -p "  Install Yggdrasil now? [y/N] " yn
              echo ""

              case "$yn" in
                  [Yy]*)
                      if ! command -v apt-get &>/dev/null; then
                          echo "  Auto-install only works on Debian / Ubuntu / Mint."
                          echo "  Please install Yggdrasil manually, then re-run:"
                          echo "    https://yggdrasil-network.github.io/installation.html"
                          echo ""
                          read -r -p "  Continue without Yggdrasil? [y/N] " cont
                          [[ "$cont" =~ ^[Yy] ]] || { echo "Exiting."; exit 0; }
                          return 0
                      fi

                      echo "  Installing Yggdrasil via the official apt repository…"

                      if ! command -v gpg &>/dev/null; then
                          sudo apt-get install -y gnupg
                      fi

                      sudo mkdir -p /usr/local/apt-keys
                      gpg --batch --yes --fetch-keys \
                          https://neilalexander.s3.dualstack.eu-west-2.amazonaws.com/deb/key.txt
                      gpg --batch --yes --export 1C5162E133015D81A811239D1840CDAC6011C5EA \
                          | sudo tee /usr/local/apt-keys/yggdrasil-keyring.gpg > /dev/null
                      echo 'deb [signed-by=/usr/local/apt-keys/yggdrasil-keyring.gpg] https://neilalexander.s3.dualstack.eu-west-2.amazonaws.com/deb/ debian yggdrasil' \
                          | sudo tee /etc/apt/sources.list.d/yggdrasil.list > /dev/null

                      sudo apt-get update -q
                      sudo apt-get install -y yggdrasil

                      # Generate config and seed public peers if not already present
                      if [ ! -f /etc/yggdrasil/yggdrasil.conf ]; then
                          sudo yggdrasil -genconf \
                              | sudo tee /etc/yggdrasil/yggdrasil.conf >/dev/null

                          sudo python3 - <<'PYEOF'
          import re
          conf_path = '/etc/yggdrasil/yggdrasil.conf'
          with open(conf_path) as f:
              conf = f.read()
          peers = [
              'tls://london.sabretruth.org:18472',
              'tls://yggdrasil.neilalexander.dev:64648?key=ecbbcb3298e7d3b4196103333c3e839cfe47a6ca47602b94a6d596683f6bb358',
          ]
          peer_lines = '\n'.join('  ' + p for p in peers)
          conf = re.sub(r'Peers:\s*\[\s*\]', 'Peers: [\n' + peer_lines + '\n]', conf)
          with open(conf_path, 'w') as f:
              f.write(conf)
          PYEOF
                      fi

                      sudo systemctl enable yggdrasil
                      sudo systemctl start yggdrasil

                      YGG_ADDR=$(sudo yggdrasilctl getself 2>/dev/null \
                          | awk '/address/ {print $2}' || true)

                      echo ""
                      echo "  ✓ Yggdrasil installed and running."
                      [ -n "$YGG_ADDR" ] && echo "    Your address: $YGG_ADDR"
                      echo ""
                      echo "  Two public peers added to /etc/yggdrasil/yggdrasil.conf"
                      echo ""
                      ;;
                  *)
                      echo "  Skipping Yggdrasil — connecting by hostname/IP only."
                      echo ""
                      ;;
              esac
          }

          # ── Yggdrasil service lifecycle ─────────────────────────────────────
          STARTED_YGGDRASIL=0

          start_yggdrasil() {
              command -v systemctl &>/dev/null || return
              systemctl list-unit-files yggdrasil.service &>/dev/null 2>&1 || return
              systemctl is-active --quiet yggdrasil && return

              echo "  Starting Yggdrasil…"
              sudo systemctl start yggdrasil
              STARTED_YGGDRASIL=1

              printf "  Waiting for interface"
              for i in $(seq 1 20); do
                  if ip link show ygg0 &>/dev/null 2>&1 || \
                     ip link show tun0 &>/dev/null 2>&1; then
                      echo " — ready."
                      return
                  fi
                  printf "."
                  sleep 1
              done
              echo " — timeout, continuing anyway."
          }

          cleanup() {
              [ "$STARTED_YGGDRASIL" -eq 1 ] && {
                  echo ""
                  echo "  Stopping Yggdrasil…"
                  sudo systemctl stop yggdrasil
              }
          }
          trap cleanup EXIT

          ensure_yggdrasil
          start_yggdrasil

          exec "$HERE/mumble-chat" "$@"
          RUNSCRIPT
          chmod +x MumbleChatPkg/run.sh

      - name: Build self-extracting archive
        run: |
          makeself \
            MumbleChatPkg/ \
            "mumble-chat-${{ github.ref_name }}-linux.run" \
            "Mumble Chat ${{ github.ref_name }}" \
            ./run.sh

      - name: Create GitHub Release and upload
        uses: softprops/action-gh-release@v2
        with:
          files: mumble-chat-${{ github.ref_name }}-linux.run
          generate_release_notes: true
          body: |
            ## Installation

            Download `mumble-chat-${{ github.ref_name }}-linux.run`, then:

            ```bash
            chmod +x mumble-chat-${{ github.ref_name }}-linux.run
            ./mumble-chat-${{ github.ref_name }}-linux.run
            ```

            No FUSE, no manual dependency installs required.
            If Yggdrasil is not installed the app will offer to install it for you.
